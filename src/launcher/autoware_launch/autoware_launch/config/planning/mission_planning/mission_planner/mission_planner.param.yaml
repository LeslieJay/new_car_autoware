/**:
  ros__parameters:
    map_frame: map
    arrival_check_angle_deg: 1.0
    arrival_check_duration: 1.0
    arrival_check_lateral_distance: 0.02
    arrival_check_longitudinal_undershoot_distance: 0.03 # Max allowed distance before the goal (vehicle has not yet reached the goal) for arrival check [m].
    arrival_check_longitudinal_overshoot_distance: 0.05 # Max allowed distance past the goal (vehicle has overshot the goal) for arrival check [m].
    goal_angle_threshold_deg: 1.0
    enable_correct_goal_pose: false
    reroute_time_threshold: 10.0
    minimum_reroute_length: 30.0
    consider_no_drivable_lanes: false # This flag is for considering no_drivable_lanes in planning or not.
    check_footprint_inside_lanes: false
    allow_reroute_in_autonomous_mode: true
    goal_lanelet_transparency: 0.05 # Sets the transparency of the goal lanelet marker in RViz. Higher value makes the marker more visible.
