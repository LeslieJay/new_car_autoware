/**:
  ros__parameters:
    simple_lane_change_avoidance:

      # ======================================================================
      # Simple Lane Change Avoidance（简单变道避障）参数
      #
      # 模块用途：
      #   在当前车道前方检测满足条件的低速/静止障碍物，通过生成一条横向偏移
      #   的避障轨迹，在绕过障碍物后重新返回原参考路径。
      #
      # 目标筛选流程：
      #   1. 障碍物速度低于 th_moving_speed；
      #   2. 障碍物位于车辆前方；
      #   3. 障碍物距离位于 [min_forward_distance, max_forward_distance]；
      #   4. 根据 lateral_margin 计算需要的横向偏移；
      #   5. 若纵向空间足够，则生成准备段 → 横移段 → 保持段 → 回正段。
      #
      # 注意：
      #   本模块仅负责横向绕障路径生成，不负责纵向减速、停车及目标分类。
      #   参数修改后建议结合 RViz Debug Marker、规划日志及实车测试共同验证，
      #   不建议仅依据单帧可视化结果判断效果。
      # ======================================================================

      # [m/s] 判断障碍物是否属于运动目标的速度阈值。
      #
      # 障碍物速度 < 此值：
      #     认为是静止（或近似静止）目标，可参与绕行。
      #
      # 障碍物速度 >= 此值：
      #     认为目标仍在运动，本模块忽略，由其它规划模块处理。
      #
      # 调大：
      #   更多缓慢运动目标参与绕行。
      #
      # 调小：
      #   仅真正静止目标参与规划。
      th_moving_speed: 0.5

      # [m] 开始检测前方障碍物的最小距离。
      #
      # 小于该距离的障碍物不会重新作为新的绕障目标。
      #
      # 调大：
      #   避免车辆贴近障碍物时才开始规划。
      #
      # 调小：
      #   更早响应近距离目标，但可能来不及完成横向侧移。
      min_forward_distance: 1.0

      # [m] 前方障碍物搜索最大距离。
      #
      # 超过该距离暂不规划绕障。
      #
      # 调大：
      #   更早开始规划，但远距离感知误差影响更大。
      #
      # 调小：
      #   推迟避障开始时机，可能导致准备距离不足。
      max_forward_distance: 50.0

      # [m] 绕障时保持的横向安全距离。
      #
      # 该值决定车辆与障碍物之间最小横向间隔。
      #
      # 调大：
      #   更安全，但需要更大的横向空间。
      #
      # 调小：
      #   绕行更容易，但安全裕度减小。
      lateral_margin: 0.3

      # [m] 开始横向移动前至少保留的准备距离。
      #
      # 车辆不会立即开始横移，而是在准备距离之后开始执行侧移。
      #
      # 调大：
      #   横移更加平缓。
      #
      # 调小：
      #   更快开始绕障，但轨迹变化更加突然。
      min_prepare_distance: 3.0

      # [m] 完成横向侧移所需要的最小纵向距离。
      #
      # 实际侧移距离不会小于该值。
      #
      # 调大：
      #   横向变化更加平滑。
      #
      # 调小：
      #   可以更快完成绕障，但横向加速度增加。
      min_shifting_distance: 5.0

      # [m/s³] 横向 jerk 限制。
      #
      # 用于计算横向侧移轨迹平滑程度。
      #
      # 调小：
      #   轨迹更柔和，所需纵向距离更长。
      #
      # 调大：
      #   可在更短距离完成侧移，但横向动作更激烈。
      shifting_lateral_jerk: 0.2

      # [m/s] 计算侧移轨迹时采用的最低车辆速度。
      #
      # 实际计算速度：
      #
      #   max(ego_speed, min_shifting_speed)
      #
      # 主要避免车辆低速或静止时计算异常。
      #
      # 注意：
      #   该参数不会限制车辆实际行驶速度。
      min_shifting_speed: 1.0

      # [m] 超过障碍物后继续保持侧移的距离。
      #
      # 当车辆完全越过障碍物后，
      # 继续保持当前偏移距离，随后再回到原车道。
      #
      # 调大：
      #   可避免车尾擦碰障碍物。
      #
      # 调小：
      #   更快回到原路径。
      return_distance_after_object: 5.0

      # 是否发布调试 Marker。
      #
      # true：
      #   发布 RViz Marker，包括：
      #     - 障碍物
      #     - Shift Line
      #     - Prepare Point
      #     - Return Point
      #     - Avoidance Path
      #
      # false：
      #   不发布 Marker，可减少调试信息。
      publish_debug_marker: true

      # ======================================================================
      # 调参总结
      #
      # 1. 目标检测
      #    th_moving_speed
      #    min_forward_distance
      #    max_forward_distance
      #
      #    决定：
      #      哪些障碍物参与规划，以及开始规划的距离。
      #
      # --------------------------------------------------------------
      #
      # 2. 横向安全距离
      #    lateral_margin
      #
      #    决定：
      #      绕障时车辆距离障碍物的最小安全间隔。
      #
      #    增大：
      #      更安全，但需要更宽道路。
      #
      # --------------------------------------------------------------
      #
      # 3. 横向轨迹平滑程度
      #    min_prepare_distance
      #    min_shifting_distance
      #    shifting_lateral_jerk
      #
      #    三者共同决定：
      #
      #      提前多久开始横移；
      #      横移持续多久；
      #      横向动作是否平滑。
      #
      #    推荐联合调整，不建议单独大幅修改其中一个参数。
      #
      # --------------------------------------------------------------
      #
      # 4. 回正策略
      #    return_distance_after_object
      #
      #    决定：
      #      超过障碍物后多久开始返回原路径。
      #
      # --------------------------------------------------------------
      #
      # 5. 推荐调试流程
      #
      #    Step1：
      #      检查障碍物是否进入检测范围。
      #
      #    Step2：
      #      检查是否生成 Prepare Point。
      #
      #    Step3：
      #      检查 Shift Line 是否生成。
      #
      #    Step4：
      #      检查 Return Point 是否位于障碍物之后。
      #
      #    Step5：
      #      根据车辆横向跟踪效果调整：
      #          lateral_margin
      #          min_prepare_distance
      #          min_shifting_distance
      #          shifting_lateral_jerk
      #
      #    每次建议仅修改一组参数，并保存 bag、日志和 RViz Marker
      #    进行前后对比，避免多个参数同时变化导致难以定位原因。
      # ======================================================================