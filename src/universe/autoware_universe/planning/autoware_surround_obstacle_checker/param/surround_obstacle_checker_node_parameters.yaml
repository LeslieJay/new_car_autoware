surround_obstacle_checker_node:
  pointcloud:
    enable_check:
      type: bool
      description: Enable to check surrounding obstacle
  object_types:
    type: string_array
    default_value: [unknown, car, truck, bus, trailer, motorcycle, bicycle, pedestrian]
  __map_object_types:
    enable_check:
      type: bool
      description: Enable to check surrounding obstacle
  obstacle_types:
    type: string_array
    default_value: [pointcloud, unknown, car, truck, bus, trailer, motorcycle, bicycle, pedestrian]
  __map_obstacle_types:
    surround_check_front_distance:
      type: double
      description: If objects exist in this distance, transit to 'exist-surrounding-obstacle' status. [m]
      validation:
        gt_eq<>: [0.0]
    surround_check_side_distance:
      type: double
      description: If objects exist in this distance, transit to 'exist-surrounding-obstacle' status. [m]
      validation:
        gt_eq<>: [0.0]
    surround_check_back_distance:
      type: double
      description: If objects exist in this distance, transit to 'exist-surrounding-obstacle' status. [m]
      validation:
        gt_eq<>: [0.0]
  surround_check_hysteresis_distance:
    type: double
    description:
      If no object exists in this hysteresis distance added to the above distance, transit to
      'non-surrounding-obstacle' status [m]
    validation:
      gt_eq<>: [0.0]
  state_clear_time:
    type: double
    description: Threshold to clear stop state [s]
    validation:
      gt_eq<>: [0.0]
  stop_state_ego_speed:
    type: double
    description: Threshold to check ego vehicle stopped [m/s]
    validation:
      gt_eq<>: [0.0]
  stop_only_when_stopped:
    type: bool
    default_value: true
    description: Preserve legacy behavior that only prevents an already stopped vehicle from starting.
  fail_safe_on_data_timeout:
    type: bool
    default_value: false
    description: Request a stop when a required input is missing or stale.
  data_timeout_sec:
    type: double
    default_value: 0.5
    description: Maximum age of required input data measured from local receipt time [s].
    validation:
      gt<>: [0.0]
  request_command_gate_stop:
    type: bool
    default_value: false
    description: Also request the vehicle command gate moderate stop service.
  stop_request_source:
    type: string
    default_value: surround_obstacle_checker
    description: Stable source key used for velocity-limit and command-gate stop requests.
  publish_debug_footprints:
    type: bool
    description: Publish vehicle footprint & footprints with surround_check_distance and
      surround_check_recover_distance offsets.
  debug_footprint_label:
    type: string
    description: Select the label for debug footprint
    validation:
      one_of<>: [[pointcloud, unknown, car, truck, bus, trailer, motorcycle, bicycle, pedestrian]]
