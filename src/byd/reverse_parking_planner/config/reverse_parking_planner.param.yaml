/**:
  ros__parameters:
    # 统一节点频率
    control_rate: 30.0
    publish_rate: 10.0

    # 车辆与轨迹参数
    wheel_base: 1.01
    path_resolution: 0.05
    velocity_reverse: -1.0
    velocity_creep: 0.05
    decel_distance: 1.5

    # 最简直线倒车准入约束（不满足时拒绝规划）
    max_straight_lateral_error: 1.0
    max_straight_yaw_error: 1.0
    min_reverse_distance: 0.20
    # 倒车累计行驶距离上限（米），超过后立即停车发 0 速度；0 表示不限制
    max_reverse_driving_distance: 0.0

    # Pure Pursuit 横向参数
    lookahead_distance: 0.8
    min_lookahead_distance: 0.3
    lookahead_ratio: 2.0
    reverse_lookahead_distance: 0.4
    max_steering_angle: 0.6
    stanley_gain: 1.5

    # PID 纵向参数
    pid:
      kp: 1.5
      ki: 0.1
      kd: 0.08
      integral_max: 3.0
    max_acceleration: 0.5
    max_deceleration: -1.0

    # 终点判定与最终接近
    goal_distance_threshold: 0.05
    goal_yaw_threshold: 0.03
    stop_velocity_threshold: 0.02
    final_approach_distance: 1.0
    final_approach_speed: 0.05
